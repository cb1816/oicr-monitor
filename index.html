<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>OICR Monitor</title>
<style>
:root{--bg:#0b1220;--panel:#131c2e;--panel2:#1b2942;--line:#25324d;--txt:#e8edf6;--mut:#93a1b8;
  --accent:#4f9cff;--pos:#22c55e;--neg:#f4536b;--warn:#f5b642;--chip:#1e2c46;--hot:#ff7a45}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.4}
.wrap{max-width:760px;margin:0 auto;padding:0 12px 96px}
header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0b1220 72%,rgba(11,18,32,.92));padding:12px 12px 8px;border-bottom:1px solid var(--line)}
.hrow{max-width:760px;margin:0 auto;display:flex;align-items:baseline;justify-content:space-between;gap:8px}
h1{font-size:18px;margin:0}h1 b{color:var(--accent)}
.sub{font-size:11.5px;color:var(--mut);margin-top:2px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.infob{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--chip);border:1px solid var(--line);color:var(--accent);font-weight:800;font-style:italic;font-family:Georgia,serif;font-size:15px;line-height:1;cursor:pointer;padding:0}
.ihead{font-size:12.5px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 5px}
.ihead.hot{color:var(--hot)}
.ibox{background:rgba(255,122,69,.10);border:1px solid rgba(255,122,69,.35);border-radius:10px;padding:11px 13px;margin-top:4px}
.ip{font-size:12.5px;color:var(--txt);line-height:1.5;margin:0 0 7px}
.ip b{color:#fff}
.istep{display:flex;gap:9px;margin:8px 0;font-size:12.5px;line-height:1.45}
.istep .n{flex:0 0 20px;height:20px;border-radius:50%;background:var(--hot);color:#1a0d06;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center}
.controls{max-width:760px;margin:8px auto 0}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:var(--chip);color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--accent);color:#04101f;border-color:var(--accent)}
.chip.mom.on{background:var(--hot);color:#1a0d06;border-color:var(--hot)}
.row2{display:flex;gap:6px;margin-top:6px}
select,input{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-size:14px;width:100%;font-family:inherit}
select{flex:1;min-width:0}
.searchw{position:relative;flex:1}.searchw input{padding-left:32px}
.searchw::before{content:"🔎";position:absolute;left:9px;top:8px;font-size:14px;opacity:.6}
nav{position:fixed;bottom:0;left:0;right:0;background:#0d1626;border-top:1px solid var(--line);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;color:var(--mut);padding:9px 4px 8px;font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
nav button .ic{font-size:18px;line-height:1}
nav button.on{color:var(--accent)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
.card:active{background:var(--panel2)}
.rank{flex:0 0 30px;text-align:center;font-weight:800;font-size:15px;color:var(--mut)}
.rank.t{color:var(--pos)}.rank.b{color:var(--neg)}
.info{flex:1;min-width:0}
.nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct{font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.val{flex:0 0 auto;text-align:right;min-width:66px}
.pct{font-size:16px;font-weight:800}
.pos{color:var(--pos)}.neg{color:var(--neg)}.zero{color:var(--mut)}
.stars{font-size:10px;color:var(--warn);margin-top:1px;letter-spacing:1px}
.badges{margin-top:2px;display:flex;gap:4px;flex-wrap:wrap}
.qbadge{display:inline-block;font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:5px}
.q1{background:rgba(34,197,94,.16);color:var(--pos)}.q4{background:rgba(244,83,107,.16);color:var(--neg)}
.mbadge{background:rgba(255,122,69,.18);color:var(--hot)}
.sec{font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;margin:16px 4px 6px}
.sec.flop{color:var(--neg)}.sec.top{color:var(--pos)}.sec.hot{color:var(--hot)}
.empty{color:var(--mut);text-align:center;padding:40px 10px;font-size:13px}
.catcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden}
.cathead{display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer}
.cathead .cn{flex:1;font-size:13.5px;font-weight:700;min-width:0}
.cathead .cval{text-align:right;flex:0 0 auto}
.cathead .cv{font-size:15px;font-weight:800}
.cathead .cmeta{font-size:10.5px;color:var(--mut)}
.catbody{border-top:1px solid var(--line);padding:4px 12px 8px;display:none}
.catcard.open .catbody{display:block}
.mini{display:flex;justify-content:space-between;gap:8px;padding:6px 0;font-size:12.5px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer}
.mini:last-child{border-bottom:none}.mini .mn{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mlbl{font-size:10px;color:var(--mut);margin:6px 0 2px;text-transform:uppercase;letter-spacing:.5px}
.sortrow{display:flex;gap:6px;margin:10px 4px 4px}
.sortrow .sc{font-size:11.5px;font-weight:700;color:var(--mut);background:var(--chip);border:1px solid var(--line);border-radius:8px;padding:5px 10px;cursor:pointer}
.sortrow .sc.on{background:var(--panel2);color:var(--txt);border-color:var(--accent)}
.ov{position:fixed;inset:0;background:rgba(4,8,16,.7);z-index:50;display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.sheet{background:var(--panel);width:100%;max-width:760px;border-radius:16px 16px 0 0;border-top:1px solid var(--line);max-height:88vh;overflow:auto;padding:16px 16px calc(20px + env(safe-area-inset-bottom))}
.sheet h2{font-size:16px;margin:0 6px 2px 0}.sheet .mc{font-size:12px;color:var(--mut);margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid.g2{grid-template-columns:1fr 1fr}
.kv{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 10px}
.kv .k{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.kv .v{font-size:16px;font-weight:800;margin-top:2px}.kv .v.sm{font-size:13px}
.closex{float:right;background:var(--panel2);border:1px solid var(--line);color:var(--mut);border-radius:8px;width:32px;height:32px;font-size:16px;cursor:pointer}
.note{font-size:11px;color:var(--mut);margin-top:10px;line-height:1.5}
.pill{display:inline-block;background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-size:11px;color:var(--mut);margin:0 5px 4px 0}
.mombar{height:6px;border-radius:4px;background:var(--panel2);overflow:hidden;margin-top:6px}
.mombar>i{display:block;height:100%;background:linear-gradient(90deg,#f4536b,#f5b642,#22c55e)}
.chartbox{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 8px 4px;margin-top:4px}
.chartbox svg{display:block;width:100%;height:110px}
.chleg{display:flex;justify-content:space-between;font-size:10px;color:var(--mut);padding:2px 4px 0}
.maprow{display:flex;align-items:center;gap:8px;padding:5px 2px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
.maprow:active{background:var(--panel2)}
.mlbl2{flex:0 0 42%;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:7px}
.mlbl2 .cn2{color:var(--txt)}.mlbl2 small{color:var(--mut)}
.mval2{flex:0 0 54px;text-align:right;font-size:12.5px;font-weight:800}
.mbarwrap{position:relative;flex:1;height:15px}
.mzero{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line)}
.mbar{position:absolute;top:3px;height:9px;border-radius:2px}
.mbar.mp{background:var(--pos)}.mbar.mn{background:var(--neg)}
</style>
</head>
<body>
<header>
  <div class="hrow"><h1 style="flex:0 0 auto;white-space:nowrap"><b>OICR</b> Monitor</h1><div style="display:flex;align-items:center;gap:8px;min-width:0;flex:1 1 auto;justify-content:flex-end"><div class="sub" id="cnt"></div><button id="infoBtn" class="infob" aria-label="Info">i</button></div></div>
  <div class="controls">
    <div class="chips" id="metricChips"></div>
    <div class="chips" id="macroChips" style="margin-top:6px"></div>
    <div class="row2"><select id="catSel"></select></div>
    <div class="row2"><div class="searchw"><input id="q" placeholder="Cerca fondo o ISIN…" autocomplete="off"></div></div>
  </div>
</header>
<div class="wrap"><div id="view"></div></div>
<nav>
  <button data-tab="rank" class="on"><span class="ic">📊</span>Classifica</button>
  <button data-tab="topflop"><span class="ic">🏆</span>Top / Flop</button>
  <button data-tab="cat"><span class="ic">🗂️</span>Categorie</button>
  <button data-tab="mappa"><span class="ic">🗺️</span>Mappa</button>
  <button data-tab="idee"><span class="ic">💡</span>Idee</button>
</nav>
<div class="ov" id="ov"><div class="sheet" id="sheet"></div></div>
<script>
(function(){
  function applyIsinFilter(d, isins){
    try{
      var set={}; for(var i=0;i<isins.length;i++) set[isins[i]]=1;
      var f=d.funds.filter(function(x){return set[x[0]];});
      if(f.length>0){
        d.funds=f;
        var cs={}; f.forEach(function(x){ if(x[2]) cs[x[2]]=1; });
        d.cats=Object.keys(cs).sort();
        if(d.meta){ d.meta.nTot=f.length; }
      }
    }catch(e){}
    return d;
  }
  var DEDUP_WORDS={};'ACC ACCUMULATION DIS DIST DISTRIBUTION INC CAP CAPITALISATION CLASS CLASSE CLASSIC CL SHARES SHARE RETAIL SILVER PRIVILEGE TRACK HEDGED UNHEDGED HDG HGD LOAD NO EURO EUR USD GBP CHF JPY NOK SEK HEUR HUSD HGBP HCHF PREMIUM YDIS MDIS QDIS SDIS WDIS ADIS GDIS BDIS EURH USDH GBPH CHFH JPYH MINC QINC YINC MDIST GRS'.split(' ').forEach(function(w){DEDUP_WORDS[w]=1;});
  var DEDUP_EXCL={};'ESG SRI PIR USA ALL TOP AI OIL GAS II III IV V VI VII VIII IX X XI XII EM MKT MKTS LCL CCY DBT GLB MLT AST HY DUR EQ EQY BDS FDS OPP SEL'.split(' ').forEach(function(w){DEDUP_EXCL[w]=1;});
  function dedupBase(n){
    var n2=(n||'').replace(/([a-z])([A-Z][0-9]?-[A-Z])/g,'$1 $2');
    var toks=n2.toUpperCase().replace(/[^A-Z0-9]+/g,' ').trim().split(' ');
    var strips=0;
    while(toks.length>1&&strips<6){
      var t=toks[toks.length-1];
      var isCode=!DEDUP_EXCL[t]&&(/^[A-Z]{1,3}[0-9]{0,2}$/.test(t)||/^[0-9][A-Z]$/.test(t));
      if(DEDUP_WORDS[t]||isCode){toks.pop();strips++;}else break;
    }
    return toks.join(' ');
  }
  function dedupClasses(d){
    try{
      function score(f){var idx=[4,5,6,7,8,9,10,11],s=0;for(var i=0;i<idx.length;i++)if(f[idx[i]]!=null)s++;return s;}
      var g={};
      d.funds.forEach(function(f){var k=dedupBase(f[1])||f[0];(g[k]=g[k]||[]).push(f);});
      var out=[];
      Object.keys(g).forEach(function(k){
        var a=g[k];
        a.sort(function(x,y){
          var sx=score(x),sy=score(y); if(sx!==sy)return sy-sx;
          var cx=(x[13]==null?99:x[13]),cy=(y[13]==null?99:y[13]); if(cx!==cy)return cx-cy;
          return String(x[1]).localeCompare(String(y[1]));
        });
        var r=a[0]; r[15]=a.length; out.push(r);
      });
      out.sort(function(a,b){return String(a[1]).localeCompare(String(b[1]),'it');});
      d.funds=out;
      var cc={}; out.forEach(function(x){ if(x[2]) cc[x[2]]=(cc[x[2]]||0)+1; });
      d.cats=Object.keys(cc).sort(function(a,b){return cc[b]-cc[a];});
      if(d.meta){ d.meta.nTot=out.length; d.meta.nData=out.filter(function(x){return x[8]!=null||x[4]!=null;}).length; }
    }catch(e){}
    return d;
  }
  function run(d){window.DATA=d;var s=document.createElement('script');s.src='app.js?v=5';document.body.appendChild(s);}
  function withFilter(d){
    return fetch('data/isins.json').then(function(r){return r.json()})
      .then(function(isins){return applyIsinFilter(d,isins)})
      .catch(function(){return d})
      .then(dedupClasses);
  }
  fetch('/api/data').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()})
    .then(withFilter).then(run)
    .catch(function(){fetch('data/snapshot.json').then(function(r){return r.json()}).then(function(d){d.meta.source+=' · snapshot offline';return withFilter(d)}).then(run)});
})();
</script>
